name: Build SimpleLogin AIO
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      sl_version:
        description: 'Optional: Specific SimpleLogin version to build (e.g., v3.4.0)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Latest Upstream Version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.sl_version }}" ]; then
            echo "VERSION=${{ github.event.inputs.sl_version }}" >> $GITHUB_ENV
          else
            LATEST=$(curl -s https://api.github.com/repos/simple-login/app/releases/latest | jq -r .tag_name)
            echo "VERSION=${LATEST}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: JSONbored
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jsonbored/simplelogin-aio:latest
            ghcr.io/jsonbored/simplelogin-aio:sl-${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max