name: Sync Template To Awesome-Unraid

on:
  push:
    branches: [ main ]
    paths:
      - 'simplelogin-aio.xml'
      - '.github/workflows/sync-template.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TEMPLATE_XML: simplelogin-aio.xml
      TEMPLATE_ICON_PATH: ${{ vars.TEMPLATE_ICON_PATH }}
      TARGET_REPOSITORY: ${{ vars.AWESOME_UNRAID_REPOSITORY || 'JSONbored/awesome-unraid' }}
      TARGET_XML_NAME: ${{ vars.AWESOME_UNRAID_XML_NAME || 'simplelogin-aio.xml' }}
      TARGET_ICON_NAME: ${{ vars.AWESOME_UNRAID_ICON_NAME }}
    steps:
      - name: Check sync configuration
        env:
          ENABLE_AIO_AUTOMATION: ${{ vars.ENABLE_AIO_AUTOMATION }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ "${ENABLE_AIO_AUTOMATION}" != "true" || -z "${TARGET_REPOSITORY}" || -z "${TARGET_XML_NAME}" || -z "${SYNC_TOKEN}" ]]; then
            echo "SYNC_ENABLED=false" >> "${GITHUB_ENV}"
            echo "Template sync is not fully configured; skipping."
          else
            echo "SYNC_ENABLED=true" >> "${GITHUB_ENV}"
          fi

      - name: Checkout Source Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Checkout Target Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        if: ${{ env.SYNC_ENABLED == 'true' }}
        run: |
          cp "${TEMPLATE_XML}" "target-repo/${TARGET_XML_NAME}"
          if [[ -n "${TEMPLATE_ICON_PATH}" && -n "${TARGET_ICON_NAME}" && -f "${TEMPLATE_ICON_PATH}" ]]; then
            mkdir -p target-repo/icons
            cp "${TEMPLATE_ICON_PATH}" "target-repo/icons/${TARGET_ICON_NAME}"
          fi
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_XML_NAME}"
          if [[ -n "${TARGET_ICON_NAME}" && -f "icons/${TARGET_ICON_NAME}" ]]; then
            git add "icons/${TARGET_ICON_NAME}"
          fi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync AIO template assets" && git push)
