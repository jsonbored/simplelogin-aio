name: Check SimpleLogin Upstream

on:
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check upstream
        id: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/check-upstream.py
          ./scripts/check-upstream.py

      - name: Stop if no stable upstream updates are available
        if: ${{ steps.upstream.outputs.updates_available != 'true' }}
        run: |
          echo "No stable upstream version or digest updates are available."

      - name: Create update branch
        if: ${{ steps.upstream.outputs.updates_available == 'true' && steps.upstream.outputs.strategy == 'pr' }}
        env:
          BRANCH_NAME: ${{ steps.upstream.outputs.branch_name }}
        run: git checkout -B "$BRANCH_NAME"

      - name: Apply upstream version bump
        if: ${{ steps.upstream.outputs.updates_available == 'true' && steps.upstream.outputs.strategy == 'pr' }}
        env:
          WRITE_UPSTREAM_VERSION: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/check-upstream.py

      - name: Commit upstream update
        if: ${{ steps.upstream.outputs.updates_available == 'true' && steps.upstream.outputs.strategy == 'pr' }}
        env:
          PR_TITLE: ${{ steps.upstream.outputs.pr_title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "$PR_TITLE"

      - name: Push update branch
        if: ${{ steps.upstream.outputs.updates_available == 'true' && steps.upstream.outputs.strategy == 'pr' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.upstream.outputs.branch_name }}
        run: git push --force --set-upstream origin "$BRANCH_NAME"

      - name: Open or update pull request
        if: ${{ steps.upstream.outputs.updates_available == 'true' && steps.upstream.outputs.strategy == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ steps.upstream.outputs.current_version }}
          LATEST_VERSION: ${{ steps.upstream.outputs.latest_version }}
          CURRENT_DIGEST: ${{ steps.upstream.outputs.current_digest }}
          LATEST_DIGEST: ${{ steps.upstream.outputs.latest_digest }}
          RELEASE_NOTES_URL: ${{ steps.upstream.outputs.release_notes_url }}
          BRANCH_NAME: ${{ steps.upstream.outputs.branch_name }}
          PR_TITLE: ${{ steps.upstream.outputs.pr_title }}
        run: |
          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          SimpleLogin upstream has stable updates available.

          - Current pinned upstream version: \`${CURRENT_VERSION}\`
          - Latest upstream version: \`${LATEST_VERSION}\`
          - Current pinned upstream digest: \`${CURRENT_DIGEST}\`
          - Latest upstream digest: \`${LATEST_DIGEST}\`
          - Release notes: ${RELEASE_NOTES_URL}

          This PR was opened automatically by the upstream monitor workflow.
          EOF

          existing_pr="$(gh pr list --head "$BRANCH_NAME" --base main --json number --jq '.[0].number')"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" \
              --title "$PR_TITLE" \
              --body-file "${body_file}"
          else
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "$PR_TITLE" \
              --body-file "${body_file}"
          fi
