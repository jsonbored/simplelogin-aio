[upstream]
name = "SimpleLogin"
type = "github-release"
repo = "simple-login/app"
image = "simplelogin/app-ci"
version_source = "dockerfile-arg"
version_key = "UPSTREAM_VERSION"
digest_source = "dockerfile-arg"
digest_key = "UPSTREAM_IMAGE_DIGEST"
strategy = "pr"
stable_only = true

[notifications]
release_notes_url = "https://github.com/simple-login/app/releases"
