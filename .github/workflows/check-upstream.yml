name: Check Upstream Version

on:
  schedule:
    - cron: 23 7 * * 1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    uses: JSONbored/aio-fleet/.github/workflows/aio-check-upstream.yml@294c30f6f88dcabf2ef7467f0def0ad4e3b18b74
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      workflow_title: Check Upstream Version
      component_matrix: '[""]'
      commit_paths: |
        Dockerfile
    secrets: inherit
