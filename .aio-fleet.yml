schema_version: 1
repo: simplelogin-aio
github_repo: JSONbored/simplelogin-aio
app_slug: simplelogin-aio
image:
  name: jsonbored/simplelogin-aio
  cache_scope: simplelogin-aio-image
  pytest_tag: simplelogin-aio:pytest
  publish_platforms: linux/amd64
release:
  name: SimpleLogin-AIO
  profile: upstream-aio-track
  previous_tag_command: latest-aio-tag
upstream:
  name: SimpleLogin
  version_key: UPSTREAM_VERSION
  digest_arg: UPSTREAM_IMAGE_DIGEST
  monitor:
    - component: aio
      name: SimpleLogin
      source: github-tags
      repo: simple-login/app
      image: simplelogin/app-ci
      digest_source: dockerhub
      dockerfile: Dockerfile
      version_key: UPSTREAM_VERSION
      digest_key: UPSTREAM_IMAGE_DIGEST
      stable_only: true
      strategy: pr
      release_notes_url: https://github.com/simple-login/app/releases
template:
  xml_paths:
    - simplelogin-aio.xml
  generated: false
catalog:
  published: true
  assets:
    - source: simplelogin-aio.xml
      target: simplelogin-aio.xml
tests:
  unit: tests/unit
  integration: tests/integration -m integration
  checkout_submodules: false
validation:
  required_targets:
    - /appdata
    - /custom-assets
    - /pgp
    - "25"
    - "7777"
    - ADMIN_EMAIL
    - ALIAS_AUTOMATIC_DISABLE
    - ALIAS_DOMAINS
    - ALIAS_LIMIT
    - ALLOWED_REDIRECT_DOMAINS
    - APPLE_API_SECRET
    - AUTO_GENERATE_PGP
    - AWS_ACCESS_KEY_ID
    - AWS_REGION
    - AWS_SECRET_ACCESS_KEY
    - BOUNCE_PREFIX
    - BOUNCE_PREFIX_FOR_REPLY_PHASE
    - BOUNCE_SUFFIX
    - BREVO_PASSWORD
    - BREVO_USERNAME
    - BUCKET
