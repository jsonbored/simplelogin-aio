name: CI / SimpleLogin-AIO

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - Dockerfile
      - cliff.toml
      - pyproject.toml
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - .trunk/**
      - upstream.toml
      - simplelogin-aio.xml
      - renovate.json
      - .github/workflows/**
  pull_request:
    branches: [main]
    paths:
      - CHANGELOG.md
      - Dockerfile
      - cliff.toml
      - pyproject.toml
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - .trunk/**
      - upstream.toml
      - simplelogin-aio.xml
      - renovate.json
      - .github/workflows/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: jsonbored/simplelogin-aio
  PYTHON_VERSION: "3.13"
  TRUNK_ORG_URL_SLUG: aethereal

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_related: ${{ steps.filter.outputs.build_related }}
      xml_related: ${{ steps.filter.outputs.xml_related }}
      renovate_related: ${{ steps.filter.outputs.renovate_related }}
      tooling_related: ${{ steps.filter.outputs.tooling_related }}
      workflow_related: ${{ steps.filter.outputs.workflow_related }}
      run_tests_requested: ${{ steps.filter.outputs.run_tests_requested }}
      publish_requested: ${{ steps.filter.outputs.publish_requested }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          python3 scripts/ci_flags.py \
            --event-name "${EVENT_NAME}" \
            --ref "${GITHUB_REF_VALUE}" >> "${GITHUB_OUTPUT}"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "xml_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
            head="${HEAD_SHA}"
          else
            base="${BEFORE_SHA}"
            head="${GITHUB_SHA_VALUE}"
          fi

          if ! git rev-parse --git-dir >/dev/null 2>&1; then
            echo "Git metadata is unavailable; treating the workflow as fully impacted."
            echo "build_related=true" >> "${GITHUB_OUTPUT}"
            echo "xml_related=true" >> "${GITHUB_OUTPUT}"
            echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
            echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
            echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
            if ! changed_files="$(git show --pretty='' --name-only "${head}" 2>/dev/null)"; then
              echo "Unable to inspect commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "xml_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          else
            if ! changed_files="$(git diff --name-only "${base}" "${head}" 2>/dev/null)"; then
              echo "Unable to diff commit range; treating the workflow as fully impacted."
              echo "build_related=true" >> "${GITHUB_OUTPUT}"
              echo "xml_related=true" >> "${GITHUB_OUTPUT}"
              echo "renovate_related=true" >> "${GITHUB_OUTPUT}"
              echo "tooling_related=true" >> "${GITHUB_OUTPUT}"
              echo "workflow_related=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          printf 'Changed files:\n%s\n' "${changed_files}"

          build_related=false
          xml_related=false
          renovate_related=false
          tooling_related=false
          workflow_related=false

          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            case "${path}" in
              Dockerfile|pyproject.toml|requirements-dev.txt|upstream.toml|rootfs/*|tests/*)
                build_related=true
                ;;
              simplelogin-aio.xml)
                xml_related=true
                ;;
              CHANGELOG.md|cliff.toml|scripts/*|.trunk/*)
                tooling_related=true
                ;;
              .github/workflows/*)
                tooling_related=true
                workflow_related=true
                ;;
              renovate.json)
                renovate_related=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "build_related=${build_related}" >> "${GITHUB_OUTPUT}"
          echo "xml_related=${xml_related}" >> "${GITHUB_OUTPUT}"
          echo "renovate_related=${renovate_related}" >> "${GITHUB_OUTPUT}"
          echo "tooling_related=${tooling_related}" >> "${GITHUB_OUTPUT}"
          echo "workflow_related=${workflow_related}" >> "${GITHUB_OUTPUT}"

  validate-template:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true' || needs.detect-changes.outputs.renovate_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate shell and python scripts
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
        run: |
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile scripts/ci_flags.py
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile scripts/check-upstream.py
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile scripts/validate-template.py
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile scripts/update-template-changes.py
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile scripts/release.py
          PYTHONPYCACHEPREFIX=/tmp/simplelogin-aio-pyc python3 -m py_compile rootfs/etc/simplelogin-aio/validate-config.py
          find rootfs -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find rootfs -type f -path '*/run' -print0 | xargs -0 -n1 bash -n

      - name: Validate Renovate config
        if: ${{ needs.detect-changes.outputs.renovate_related == 'true' }}
        run: npx --yes --package renovate renovate-config-validator renovate.json

  pinned-actions:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip when workflow files are unchanged
        if: ${{ needs.detect-changes.outputs.workflow_related != 'true' }}
        run: echo "Workflow files unchanged; skipping pinned action scan."

      - name: Checkout
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce pinned action SHAs
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow_dir = pathlib.Path(".github/workflows")
          pattern = re.compile(r"^\s*uses:\s*([^@\s]+)@([^\s#]+)")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          failures = []

          for path in sorted(workflow_dir.glob("*.yml")):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = pattern.match(line)
                  if not match:
                      continue
                  target, ref = match.groups()
                  if target.startswith("./"):
                      continue
                  if not sha_pattern.fullmatch(ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA -> {line.strip()}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          print("All workflow actions are pinned to full commit SHAs.")
          PY

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  unit-tests:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest unit tests
        id: unit_pytest
        run: |
          mkdir -p reports
          rm -f reports/pytest-unit.xml
          set +e
          python -m pytest \
            tests/unit \
            tests/template \
            --junit-xml=reports/pytest-unit.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload unit test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-unit.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Fail if unit tests failed
        if: ${{ steps.unit_pytest.outputs.exit_code != '0' }}
        run: exit 1

  integration-tests:
    if: ${{ needs.detect-changes.outputs.run_tests_requested == 'true' && (needs.detect-changes.outputs.build_related == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true')) }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Prebuild pytest image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: simplelogin-aio:pytest
          cache-from: type=gha,scope=simplelogin-aio-pytest
          cache-to: type=gha,mode=max,scope=simplelogin-aio-pytest

      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest integration tests
        id: integration_pytest
        env:
          AIO_PYTEST_USE_PREBUILT_IMAGE: "true"
        run: |
          mkdir -p reports
          rm -f reports/pytest-integration.xml
          set +e
          python -m pytest \
            tests/integration \
            -m integration \
            --junit-xml=reports/pytest-integration.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload integration test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2
        env:
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-integration.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Dump Docker diagnostics
        if: ${{ failure() || (steps.integration_pytest.conclusion == 'success' && steps.integration_pytest.outputs.exit_code != '0') }}
        run: |
          docker ps -a
          echo
          docker images

      - name: Fail if integration tests failed
        if: ${{ steps.integration_pytest.outputs.exit_code != '0' }}
        run: exit 1

  publish:
    if: ${{ (needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true') && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true' && needs.integration-tests.result == 'success' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
      - integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker Hub publish settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE_NAME }}
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

          if [[ -n "${DOCKERHUB_IMAGE_NAME}" ]]; then
            echo "image_name=${DOCKERHUB_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Login to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        env:
          DOCKERHUB_ENABLED: ${{ steps.dockerhub.outputs.enabled }}
          DOCKERHUB_IMAGE_NAME: ${{ steps.dockerhub.outputs.image_name }}
        run: |
          image_ghcr="$(printf '%s' "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_image_name="${DOCKERHUB_IMAGE_NAME:-${IMAGE_NAME}}"
          image_dockerhub="$(printf '%s' "${dockerhub_image_name}" | tr '[:upper:]' '[:lower:]')"
          sha_tag_ghcr="${image_ghcr}:sha-${GITHUB_SHA}"
          raw_version="$(sed -n 's/^ARG UPSTREAM_VERSION=//p' Dockerfile | head -n1)"
          upstream_version="${raw_version%%@*}"
          upstream_digest="$(sed -n 's/^ARG UPSTREAM_IMAGE_DIGEST=//p' Dockerfile | head -n1)"
          changelog_version="$(python3 scripts/release.py latest-changelog-version 2>/dev/null || true)"
          aio_revision=""
          case "${changelog_version}" in
            "${upstream_version}"-aio.*)
              candidate_revision="${changelog_version##*.}"
              if [[ "${candidate_revision}" =~ ^[0-9]+$ ]]; then
                aio_revision="${candidate_revision}"
              fi
              ;;
          esac
          if [[ -n "${aio_revision}" ]]; then
            aio_track="aio-v${aio_revision}"
          else
            aio_track="aio-v1"
          fi

          {
            echo "upstream_version=${upstream_version}"
            echo "upstream_digest=${upstream_digest}"
            echo "aio_track=${aio_track}"
            echo "tags<<EOF"
            echo "${image_ghcr}:latest"
            if [[ -n "${upstream_version}" ]]; then
              echo "${image_ghcr}:${upstream_version}"
              echo "${image_ghcr}:${upstream_version}-${aio_track}"
            fi
            echo "${sha_tag_ghcr}"

            if [[ "${DOCKERHUB_ENABLED}" == "true" ]]; then
              echo "${image_dockerhub}:latest"
              if [[ -n "${upstream_version}" ]]; then
                echo "${image_dockerhub}:${upstream_version}"
                echo "${image_dockerhub}:${upstream_version}-${aio_track}"
              fi
              echo "${image_dockerhub}:sha-${GITHUB_SHA}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=simplelogin-aio-publish
          cache-to: type=gha,mode=max,scope=simplelogin-aio-publish
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/JSONbored/simplelogin-aio
            org.opencontainers.image.title=simplelogin-aio
            org.opencontainers.image.version=${{ steps.prep.outputs.upstream_version || '' }}
            org.opencontainers.image.description=Unraid-first AIO wrapper image for SimpleLogin (web, jobs, email, postgres, redis, postfix)
            io.jsonbored.upstream.name=SimpleLogin
            io.jsonbored.upstream.version=${{ steps.prep.outputs.upstream_version || '' }}
            io.jsonbored.upstream.digest=${{ steps.prep.outputs.upstream_digest || '' }}
            io.jsonbored.wrapper.name=simplelogin-aio
            io.jsonbored.wrapper.type=unraid-aio
            io.jsonbored.wrapper.track=${{ steps.prep.outputs.aio_track }}

  sync-awesome-unraid:
    if: ${{ needs.detect-changes.outputs.xml_related == 'true' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check sync configuration
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ -z "${SYNC_TOKEN}" ]]; then
            echo "SYNC_ENABLED=false" >> "${GITHUB_ENV}"
            echo "SYNC_TOKEN is not configured; skipping sync."
          else
            echo "SYNC_ENABLED=true" >> "${GITHUB_ENV}"
          fi

      - name: Checkout Source Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Target Repository
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        if: ${{ env.SYNC_ENABLED == 'true' }}
        run: |
          cp simplelogin-aio.xml target-repo/simplelogin-aio.xml

      - name: Create sync pull request
        if: ${{ env.SYNC_ENABLED == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          add-paths: simplelogin-aio.xml
          commit-message: "chore: auto-sync simplelogin-aio.xml from upstream"
          branch: sync-awesome-unraid/simplelogin-aio
          delete-branch: true
          base: main
          title: "chore: sync simplelogin-aio template"
          body: |
            Automated sync from `JSONbored/simplelogin-aio`.
