name: Check Upstream Version

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    uses: JSONbored/aio-fleet/.github/workflows/aio-check-upstream.yml@c8cfa2e0d5e02e5c22e54647a7f32310a10acfac
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      workflow_title: Check Upstream Version
      component_matrix: '[""]'
      commit_paths: |
        Dockerfile
    secrets: inherit
