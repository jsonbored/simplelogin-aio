name: Check Upstream Version

on:
  schedule:
    - cron: 23 7 * * 1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-upstream:
    uses: JSONbored/aio-fleet/.github/workflows/aio-check-upstream.yml@5426c8638dc2bb2bf1faa355d9db786ad044c7fa
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      workflow_title: Check Upstream Version
      component_matrix: '[""]'
      commit_paths: |
        Dockerfile
    secrets: inherit
