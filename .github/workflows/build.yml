name: CI / SimpleLogin AIO

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - ".github/workflows/**"
      - ".trunk/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "README.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "simplelogin-aio.xml"
      - "tests/**"
      - "upstream.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - ".github/workflows/**"
      - ".trunk/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "README.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "assets/**"
      - "cliff.toml"
      - "components.toml"
      - "components/**"
      - "docs/**"
      - "docs/upstream/**"
      - "pyproject.toml"
      - "renovate.json"
      - "requirements-dev.txt"
      - "rootfs/**"
      - "scripts/**"
      - "simplelogin-aio.xml"
      - "tests/**"
      - "upstream.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@c4099c09cb2375a0f5a5a822a0f8af02a77d0526
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: simplelogin-aio
      image_name: jsonbored/simplelogin-aio
      workflow_title: CI / SimpleLogin AIO
      docker_cache_scope: simplelogin-aio-image
      pytest_image_tag: simplelogin-aio:pytest
      publish_profile: upstream-aio-track
      upstream_name: SimpleLogin
      image_description: Unraid-first AIO wrapper image for SimpleLogin
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64
      checkout_submodules: false
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: false
      extended_integration_pytest_args: ""
      generator_check_command: ""
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      catalog_published: true
      xml_paths: |
        simplelogin-aio.xml
      extra_publish_paths: |

      catalog_assets: |
        simplelogin-aio.xml|simplelogin-aio.xml
    secrets: inherit
